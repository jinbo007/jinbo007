<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深圳天气</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .location {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .current {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .weather-icon {
            font-size: 80px;
        }

        .temperature {
            font-size: 72px;
            font-weight: 300;
            color: #333;
        }

        .condition {
            font-size: 24px;
            color: #666;
            margin-bottom: 20px;
        }

        .details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .detail-label {
            font-size: 14px;
            color: #999;
        }

        .detail-value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .loading {
            font-size: 18px;
            color: #666;
        }

        .error {
            color: #e74c3c;
            font-size: 16px;
        }

        .refresh-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .last-update {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="weather-card">
        <div class="location">深圳</div>
        <div id="weather-content">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const weatherEmojis = {
            'Sunny': '☀️',
            'Clear': '🌙',
            'Partly cloudy': '⛅',
            'Cloudy': '☁️',
            'Overcast': '☁️',
            'Mist': '🌫️',
            'Fog': '🌫️',
            'Rain': '🌧️',
            'Light rain': '🌦️',
            'Heavy rain': '⛈️',
            'Thunderstorm': '⛈️',
            'Snow': '❄️',
            'default': '🌡️'
        };

        function getWeatherEmoji(condition) {
            for (const [key, emoji] of Object.entries(weatherEmojis)) {
                if (condition.toLowerCase().includes(key.toLowerCase())) {
                    return emoji;
                }
            }
            return weatherEmojis['default'];
        }

        async function fetchWeather() {
            const content = document.getElementById('weather-content');
            content.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch('https://wttr.in/Shenzhen?format=j1');
                const data = await response.json();

                const current = data.current_condition[0];
                const area = data.nearest_area[0];

                const temp = current.temp_C;
                const feelsLike = current.FeelsLikeC;
                const humidity = current.humidity;
                const windSpeed = current.windspeedKmph;
                const windDir = current.winddir16Point;
                const condition = current.weatherDesc[0].value;
                const icon = getWeatherEmoji(condition);

                content.innerHTML = `
                    <div class="current">
                        <div class="weather-icon">${icon}</div>
                        <div class="temperature">${temp}°C</div>
                    </div>
                    <div class="condition">${condition}</div>
                    <div class="details">
                        <div class="detail-item">
                            <span class="detail-label">体感温度</span>
                            <span class="detail-value">${feelsLike}°C</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">湿度</span>
                            <span class="detail-value">${humidity}%</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">风速</span>
                            <span class="detail-value">${windSpeed} km/h</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">风向</span>
                            <span class="detail-value">${windDir}</span>
                        </div>
                    </div>
                    <button class="refresh-btn" onclick="fetchWeather()">刷新</button>
                    <div class="last-update">最后更新: ${new Date().toLocaleTimeString('zh-CN')}</div>
                `;

            } catch (error) {
                content.innerHTML = `
                    <div class="error">加载失败，请重试</div>
                    <button class="refresh-btn" onclick="fetchWeather()">重试</button>
                `;
                console.error('Error fetching weather:', error);
            }
        }

        // Initial fetch
        fetchWeather();

        // Auto refresh every 10 minutes
        setInterval(fetchWeather, 600000);
    </script>
</body>
</html>
